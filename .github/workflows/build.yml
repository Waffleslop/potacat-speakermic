name: Build Firmware

on:
  push:
    branches: [main]
    paths: ['firmware/**']
  pull_request:
    branches: [main]
    paths: ['firmware/**']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: cd firmware && pio run

      - name: Upload firmware artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: firmware/.pio/build/xiao_esp32s3/firmware.bin
