; POTACAT Speakermic Firmware
; https://github.com/Waffleslop/potacat-speakermic
;
; Build environments:
;   pio run -e test        -> Bare board test (no external hardware needed)
;   pio run -e test-audio   -> BLE audio streaming test (PTT on D1/GPIO2)
;   pio run -e xiao_esp32s3 -> Full firmware (requires all hardware)

[platformio]
default_envs = test-audio

; --- Shared settings ---
[common]
platform = espressif32@6.9.0
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags =
    -DCONFIG_BT_ENABLED=1
    -DCONFIG_BT_NIMBLE_ENABLED=1
    -DCONFIG_BT_NIMBLE_ROLE_PERIPHERAL=1
    -DCONFIG_BT_NIMBLE_ROLE_CENTRAL=0
    -DCONFIG_BT_NIMBLE_ROLE_OBSERVER=0
    -DCONFIG_BT_NIMBLE_ROLE_BROADCASTER=1
    -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
board_build.partitions = default_8MB.csv
board_build.arduino.memory_type = qio_opi

; --- Bare board test (just the ESP32S3 Sense, no external hardware) ---
[env:test]
extends = common
lib_deps =
    h2zero/NimBLE-Arduino@^2.1.2
build_src_filter = +<test_barebone.cpp>

; --- BLE audio test (short D1/GPIO2 to GND for PTT) ---
[env:test-audio]
extends = common
lib_deps =
    h2zero/NimBLE-Arduino@^2.1.2
build_src_filter = +<test_ble_audio.cpp>

; --- Full firmware (all hardware connected) ---
[env:xiao_esp32s3]
extends = common
lib_deps =
    h2zero/NimBLE-Arduino@^2.1.2
    adafruit/Adafruit NeoPixel@^1.12.3
build_src_filter = +<*> -<test_barebone.cpp> -<test_ble_audio.cpp>
