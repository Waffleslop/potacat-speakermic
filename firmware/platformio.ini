; POTACAT Speakermic Firmware
; https://github.com/Waffleslop/potacat-speakermic

[env:xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Use ESP32 Arduino Core 3.x for proper I2S PDM support
platform_packages =
    framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git#3.1.1

; Libraries
lib_deps =
    h2zero/NimBLE-Arduino@^2.1.2
    adafruit/Adafruit NeoPixel@^1.12.3

; Enable BLE
build_flags =
    -DCONFIG_BT_ENABLED=1
    -DCONFIG_BT_NIMBLE_ENABLED=1
    -DCONFIG_BT_NIMBLE_ROLE_PERIPHERAL=1
    -DCONFIG_BT_NIMBLE_ROLE_CENTRAL=0
    -DCONFIG_BT_NIMBLE_ROLE_OBSERVER=0
    -DCONFIG_BT_NIMBLE_ROLE_BROADCASTER=1
    -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1

; Partition scheme with enough space for BLE + audio
board_build.partitions = default_8MB.csv
board_build.arduino.memory_type = qio_opi
